<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>OCR bruto</title>
    <link rel="stylesheet" href="styles.css?v=20260326-5" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
      (function () {
        const BUILD_ID = "20260326-5";
        const KEY = "ocr26-build-id";
        const prev = localStorage.getItem(KEY);
        if (prev !== BUILD_ID) {
          localStorage.setItem(KEY, BUILD_ID);
          const url = new URL(window.location.href);
          url.searchParams.set("v", BUILD_ID);
          window.location.replace(url.toString());
          return;
        }
      })();
    </script>
  </head>
  <body>
    <main class="app">
      <video id="video" playsinline autoplay muted></video>
      <div class="actions">
        <button id="startCameraBtn">Abrir cámara</button>
        <button id="captureBtn" disabled>Capturar OCR</button>
        <button id="stopCameraBtn" disabled>Detener cámara</button>
      </div>
      <pre id="finalRaw">Esperando captura...</pre>
    </main>
    <script type="module" src="app.js?v=20260326-5"></script>
  </body>
</html>
